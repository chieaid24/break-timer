name: windows

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Install verified Inno Setup
        shell: pwsh
        run: ./scripts/install-inno.ps1
      - name: Test and build Windows packages
        shell: pwsh
        run: ./scripts/build.ps1 -SkipDependencies
      - name: Verify Windows packages
        shell: pwsh
        run: |
          $path = "dist/ProductivityTimer.exe"
          if (-not (Test-Path $path)) { throw "Executable was not created" }
          $bytes = [System.IO.File]::ReadAllBytes($path)
          if ([System.Text.Encoding]::ASCII.GetString($bytes, 0, 2) -ne "MZ") {
            throw "Executable has no Windows PE header"
          }
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3c)
          $subsystem = [BitConverter]::ToInt16($bytes, $peOffset + 92)
          if ($subsystem -ne 2) { throw "Executable is not a Windows GUI app" }
          if (-not (Test-Path "dist/installer/ProductivityTimer-Setup.exe")) {
            throw "Installer was not created"
          }
      - name: Smoke-test install and uninstall
        shell: pwsh
        run: ./scripts/test-installer.ps1
